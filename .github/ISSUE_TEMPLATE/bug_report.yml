name: Bug report
description: Something doesn't work as expected
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. **Please redact any real secret values** from `.env` snippets before posting.
  - type: input
    id: cli-version
    attributes:
      label: az-env-cli version
      description: Run `az-env --version` (or `npx az-env-cli --version`).
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Run `node --version`.
      placeholder: "v20.18.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other (please describe in additional context)
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Describe the actual behavior, including any error messages or stack traces.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: A minimal `.env` (secrets redacted) and the exact command that triggers the issue.
      render: shell
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else relevant — config layering, deployment slot, vault permissions, etc.
