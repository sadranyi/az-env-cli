name: Feature request
description: Suggest a new feature or improvement
title: "[feat] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow friction or gap you're hitting before proposing a solution.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would the feature work from the user's perspective? CLI commands, flags, output format.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to address the problem, including doing nothing.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, screenshots, links to related Azure docs, etc.
